name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Build release APK
        run: |
          set -o pipefail
          gradle assembleRelease --no-daemon --console=plain --stacktrace 2>&1 | tee build.log

      - name: Mostra errori di compilazione
        if: failure()
        run: |
          {
            echo "## Errori di compilazione"
            echo '~~~'
            grep -E "^e: " build.log | head -40 || echo "Nessuna riga di errore trovata."
            echo '~~~'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk \
             out/WattMeter-v1.0.${{ github.run_number }}.apk
          ls -lh out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WattMeter-apk
          path: out/*.apk
          retention-days: 30

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: WattMeter v1.0.${{ github.run_number }}
          body: |
            Build automatica dal commit ${{ github.sha }}.
            Scarica l'APK qui sotto e installalo direttamente dal telefono.
          files: out/*.apk
          draft: false
          prerelease: false
